<html lang="en">
<head>
  <meta charset="utf-8">
  <title>West of England LEP — Domestic EPC Ratings Over Time</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* CSS Variables for theming */
    :root {
      --bg: #f8f8f8;
      --fg: #231f20;
      --text: #231f20;
      --text-muted: #6a6a6a;
      --grid: #d4d4d4;
      --red: #bc1200;
      --link: #0777b3;
      --font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --font-mono: 'Consolas', 'Monaco', monospace;
    }
    body.theme-dark {
      --bg: #231f20;
      --fg: #ffffff;
      --text: #ffffff;
      --text-muted: #888888;
      --grid: #3a3a3a;
      --red: #bc1200;
      --link: #0777b3;
    }

    html, body {
      width: 100%; min-height: 100%;
      background-color: var(--bg);
      font-family: var(--font-family);
      color: var(--text);
      font-size: 12px;
      transition: background-color 0.3s, color 0.3s;
    }
    .dashboard {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .title-row .page-title {
      margin-bottom: 0;
    }
    .theme-toggle {
      background: transparent;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s;
    }
    .theme-toggle:hover {
      color: var(--text);
    }
    .theme-toggle svg {
      width: 16px;
      height: 16px;
    }
    .theme-toggle .icon-moon { display: block; }
    .theme-toggle .icon-sun { display: none; }
    body.theme-dark .theme-toggle .icon-moon { display: none; }
    body.theme-dark .theme-toggle .icon-sun { display: block; }
    .red-line {
      width: 100%;
      height: 2px;
      background-color: var(--red);
      margin-bottom: 8px;
    }
    .page-title {
      font-family: var(--font-family);
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 12px;
      color: var(--text);
    }
    .dashboard-section {
      margin-bottom: 16px;
    }
    /* Visual divider only appears with explicit --- separator */
    .dashboard-section.has-divider {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--grid);
    }
    .section-title {
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 16px;
    }
    .chart-title {
      font-family: var(--font-family); font-weight: 700;
      font-size: 10px;
      font-weight: bold;
      color: var(--text);
      margin-bottom: 4px;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }
    @media (max-width: 720px) {
      .row { grid-template-columns: repeat(8, 1fr); }
      /* Scale spans proportionally: preserve original span but cap at grid width */
      .row > * { grid-column: span min(var(--col-span, 8), 8); }
    }
    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .row > * { grid-column: span 1; }
      .grid-item { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    }
    @media print {
      @page { size: letter portrait; margin: 0.5in; }
      .dashboard { max-width: 100%; padding: 0; }
      .row { gap: 6px; margin-bottom: 6px; break-inside: avoid; page-break-inside: avoid; }
      .grid-item { break-inside: avoid; page-break-inside: avoid; }
      .dashboard-section { break-inside: avoid; page-break-inside: avoid; }
      .dashboard-section.page-break { page-break-before: always; }
      .section-title { break-after: avoid; page-break-after: avoid; }
      .data-table { break-inside: avoid; page-break-inside: avoid; }
      .theme-toggle { display: none; }
      .title-row { break-after: avoid; page-break-after: avoid; }
    }
    .grid-item {
      background: var(--bg);
      padding: 4px;
      transition: background-color 0.3s;
    }
    .mermaid-container svg {
      max-width: 100%;
      height: auto;
      transition: background 0.3s;
    }
    .big-value {
      font-family: var(--font-family); font-weight: 700;
      font-size: 28px;
      font-weight: bold;
      color: var(--text);
      line-height: 1;
    }
    .delta {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .delta .arrow {
      font-size: 16px;
    }
    .delta .value {
      font-family: var(--font-family);
      font-size: 16px;
      font-weight: bold;
    }
    .label {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .alert {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-left: 2px solid;
    }
    .alert .icon {
      font-size: 12px;
      flex-shrink: 0;
    }
    .alert .message {
      font-size: 11px;
      line-height: 1.4;
    }
    .note {
      border-left: 3px solid var(--red);
      background-color: color-mix(in srgb, var(--grid) 25%, transparent);
      padding: 8px 12px;
    }
    .note-warning {
      border-left-color: #C5A000;
    }
    .note-tip {
      border-left-color: #00887d;
    }
    .note-content {
      font-size: 11px;
      color: var(--text);
      line-height: 1.5;
    }
    .note-content strong {
      font-weight: 700;
    }
    .text-content {
      font-size: 11px;
      line-height: 1.5;
      color: var(--text);
    }
    pre.mermaid {
      background: transparent;
      text-align: center;
      padding: 16px 0;
    }
    .data-table {
      width: 100%; border-collapse: collapse; font-size: 11px;
    }
    .data-table th {
      font-family: var(--font-family); font-size: 9px; font-weight: bold;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em;
      padding: 6px 8px; border-bottom: 1px solid var(--text); text-align: left;
    }
    .data-table td {
      padding: 5px 8px; color: var(--text); border-bottom: 1px solid var(--grid);
    }
    .data-table tr.table-striped td {
      background-color: color-mix(in srgb, var(--grid) 19%, transparent);
    }
    .data-table.table-compact th, .data-table.table-compact td {
      padding: 4px 6px;
    }
    .markdown-content {
      font-size: 11px; color: var(--text); line-height: 1.5;
    }
    .markdown-content h1 { font-size: 18px; font-weight: 900; margin: 12px 0 6px 0; }
    .markdown-content h2 { font-size: 14px; font-weight: 700; margin: 10px 0 4px 0; }
    .markdown-content h3 { font-size: 12px; font-weight: 700; margin: 8px 0 4px 0; }
    .markdown-content p { margin: 6px 0; }
    .markdown-content ul, .markdown-content ol { margin: 6px 0; padding-left: 20px; }
    .markdown-content li { margin: 3px 0; }
    .markdown-content code {
      background: color-mix(in srgb, var(--grid) 25%, transparent); padding: 1px 4px; border-radius: 2px;
      font-family: var(--font-mono); font-size: 10px;
    }
    .markdown-content pre {
      background: color-mix(in srgb, var(--grid) 25%, transparent); padding: 8px; border-radius: 3px;
      overflow-x: auto; margin: 8px 0;
    }
    .markdown-content pre code { background: none; padding: 0; }
    .markdown-content blockquote {
      border-left: 2px solid var(--red); margin: 8px 0; padding-left: 12px;
      color: var(--text-muted); font-style: italic;
    }
    .markdown-content a { color: var(--link); text-decoration: none; }
    .markdown-content a:hover { text-decoration: underline; }
    .markdown-content strong { font-weight: 700; }
    .markdown-content em { font-style: italic; }
    .empty-space { background: transparent; }
    /* Inline header styles (### soft headers) */
    .inline-header {
      margin-top: 12px;
      margin-bottom: 4px;
    }
    .inline-header-text {
      font-family: var(--font-family);
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }
    /* Progress bar sparkline styles */
    .pct-bar-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    .pct-bar-container {
      flex: 1;
      height: 12px;
      background-color: var(--grid);
      border-radius: 2px;
      overflow: hidden;
      min-width: 60px;
    }
    .pct-bar-fill {
      height: 100%;
      background-color: #0777b3;
      border-radius: 2px 0 0 2px;
    }
    .pct-bar-value {
      font-size: 11px;
      color: var(--text);
      font-family: var(--font-family);
      font-weight: 700;
      min-width: 32px;
      flex-shrink: 0;
    }
    /* Sparkline tooltip styles - immediate display on hover */
    .spark-tooltip {
      position: relative;
      display: inline-block;
    }
    .spark-tooltip::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--font-family);
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.15s ease;
      pointer-events: none;
      z-index: 1000;
      margin-bottom: 4px;
    }
    .spark-tooltip:hover::after {
      opacity: 1;
      visibility: visible;
    }
    
    .mviz-export-menu {
      position: fixed;
      z-index: 10000;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      padding: 4px 0;
      min-width: 200px;
      font-family: var(--font-family, 'Helvetica Neue', Helvetica, Arial, sans-serif);
      font-size: 12px;
      color: #231f20;
    }
    body.theme-dark .mviz-export-menu {
      background: #424242;
      border-color: #757575;
      color: #eeeeee;
    }
    .mviz-export-menu-header {
      padding: 6px 12px 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9e9e9e;
    }
    body.theme-dark .mviz-export-menu-header { color: #757575; }
    .mviz-export-menu-item {
      padding: 6px 12px;
      cursor: pointer;
    }
    .mviz-export-menu-item:hover {
      background: #f5f5f5;
    }
    body.theme-dark .mviz-export-menu-item:hover {
      background: #3a3a3a;
    }
    @media print {
      .mviz-export-menu { display: none; }
    }
  </style>
</head>

    // --- mviz PNG export ---
    (function() {
      var PRESETS = {"square":{"width":1080,"height":1080,"label":"Square (1080 × 1080)"},"portrait":{"width":1080,"height":1350,"label":"Portrait (1080 × 1350)"},"landscape":{"width":1920,"height":1080,"label":"Landscape (1920 × 1080)"}};
      var CFG = {"LOGICAL_BASE":360,"TITLE_FONT_SIZE":14,"TITLE_PADDING_TOP":12,"TITLE_PADDING_BOTTOM":8,"TITLE_PADDING_LEFT":12,"BG_LIGHT":"#f8f8f8","BG_DARK":"#231f20","TEXT_LIGHT":"#231f20","TEXT_DARK":"#eeeeee"};
      var menu = null;

      function removeMenu() {
        if (menu && menu.parentNode) { menu.parentNode.removeChild(menu); menu = null; }
      }

      function isDarkTheme() {
        return document.body.classList.contains('theme-dark');
      }

      function getChartBg() {
        var bg = getComputedStyle(document.body).backgroundColor;
        return (bg && bg !== 'rgba(0, 0, 0, 0)') ? bg : (isDarkTheme() ? CFG.BG_DARK : CFG.BG_LIGHT);
      }

      function getChartTitle(chartEl) {
        var gridItem = chartEl.closest('.grid-item');
        if (gridItem) {
          var h3 = gridItem.querySelector('.chart-title');
          if (h3) return h3.textContent.trim();
        }
        return '';
      }

      function slugify(text) {
        return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'chart';
      }

      function renderChart(chartId, drawW, drawH) {
        var tmpDiv = document.createElement('div');
        tmpDiv.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:' + drawW + 'px;height:' + drawH + 'px;';
        document.body.appendChild(tmpDiv);

        var tmpChart = echarts.init(tmpDiv, null, {renderer: 'canvas', width: drawW, height: drawH});
        var currentTheme = isDarkTheme() ? 'dark' : 'light';
        var opts = window.chartOptions && window.chartOptions[chartId];
        var instance = window.chartInstances[chartId];
        tmpChart.setOption(opts ? opts[currentTheme] : instance.getOption());

        return { div: tmpDiv, chart: tmpChart };
      }

      function getThemeFont() {
        var fontFamily = getComputedStyle(document.body).fontFamily;
        return fontFamily || '"Helvetica Neue", Helvetica, Arial, sans-serif';
      }

      function drawTitle(ctx, title, pixelRatio) {
        ctx.fillStyle = isDarkTheme() ? CFG.TEXT_DARK : CFG.TEXT_LIGHT;
        ctx.font = 'bold ' + Math.round(CFG.TITLE_FONT_SIZE * pixelRatio) + 'px ' + getThemeFont();
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(
          title.toUpperCase(),
          Math.round(CFG.TITLE_PADDING_LEFT * pixelRatio),
          Math.round(CFG.TITLE_PADDING_TOP * pixelRatio)
        );
      }

      function triggerDownload(canvas, filename) {
        var a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = filename;
        a.click();
      }

      function exportChart(chartId, presetKey) {
        if (!window.chartInstances || !window.chartInstances[chartId]) return;

        var preset = PRESETS[presetKey];
        var targetW = preset.width;
        var targetH = preset.height;
        var pixelRatio = targetW / CFG.LOGICAL_BASE;
        var logicalH = Math.round(targetH / pixelRatio);

        // Reserve space for title
        var chartEl = document.getElementById(chartId);
        var title = getChartTitle(chartEl);
        var titleLogicalH = title ? (CFG.TITLE_PADDING_TOP + CFG.TITLE_FONT_SIZE + CFG.TITLE_PADDING_BOTTOM) : 0;

        // ECharts reflows to fill its container — give it the full space
        var tmp = renderChart(chartId, CFG.LOGICAL_BASE, logicalH - titleLogicalH);

        // Wait a frame for render, then composite
        setTimeout(function() {
          var chartDataUrl = tmp.chart.getDataURL({type: 'png', pixelRatio: pixelRatio, backgroundColor: 'transparent'});
          var titlePxH = Math.round(titleLogicalH * pixelRatio);

          var canvas = document.createElement('canvas');
          canvas.width = targetW;
          canvas.height = targetH;
          var ctx = canvas.getContext('2d');

          ctx.fillStyle = getChartBg();
          ctx.fillRect(0, 0, targetW, targetH);

          if (title) { drawTitle(ctx, title, pixelRatio); }

          var img = new Image();
          img.onload = function() {
            ctx.drawImage(img, 0, titlePxH, targetW, targetH - titlePxH);
            triggerDownload(canvas, slugify(title || 'chart') + '-' + presetKey + '.png');
            tmp.chart.dispose();
            document.body.removeChild(tmp.div);
          };
          img.src = chartDataUrl;
        }, 100);
      }

      function showMenu(e, chartId) {
        e.preventDefault();
        removeMenu();

        menu = document.createElement('div');
        menu.className = 'mviz-export-menu';

        var header = document.createElement('div');
        header.className = 'mviz-export-menu-header';
        header.textContent = 'Save as PNG';
        menu.appendChild(header);

        var keys = ['square', 'portrait', 'landscape'];
        for (var i = 0; i < keys.length; i++) {
          (function(key) {
            var item = document.createElement('div');
            item.className = 'mviz-export-menu-item';
            item.textContent = PRESETS[key].label;
            item.addEventListener('click', function() {
              removeMenu();
              exportChart(chartId, key);
            });
            menu.appendChild(item);
          })(keys[i]);
        }

        // Position near cursor, clamped to viewport
        var x = e.clientX;
        var y = e.clientY;
        document.body.appendChild(menu);
        var mw = menu.offsetWidth;
        var mh = menu.offsetHeight;
        if (x + mw > window.innerWidth) x = window.innerWidth - mw - 4;
        if (y + mh > window.innerHeight) y = window.innerHeight - mh - 4;
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
      }

      // Dismiss on click elsewhere
      document.addEventListener('click', removeMenu);
      document.addEventListener('contextmenu', function(e) {
        // Only show for chart containers that have an ECharts instance
        var target = e.target;
        var el = target.closest ? target.closest('[id]') : null;
        while (el) {
          if (window.chartInstances && window.chartInstances[el.id]) {
            showMenu(e, el.id);
            return;
          }
          el = el.parentElement ? el.parentElement.closest('[id]') : null;
        }
        // Not a chart — let default context menu through
        removeMenu();
      });
    })();
